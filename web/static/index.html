<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Sessions</title>
<style>
  /* Light palette is the default. Status colors are darkened so they stay
     legible as foreground text on near-white backgrounds. */
  :root {
    --bg:        #f7f8fa;
    --bg-2:      #eef0f4;
    --bg-3:      #e3e6ec;
    --panel:     #ffffff;
    --line:      #d3d7e0;
    --line-soft: #e4e7ee;
    --txt:       #1a1d24;
    --txt-dim:   #555c6b;
    --txt-faint: #868d9c;
    --accent:    #2563eb;
    --busy:      #057a55;
    --busy-bg:   #d7f3e6;
    --waiting:   #a15c07;
    --waiting-bg:#fcefcf;
    --inactive:  #6b7280;
    --inactive-bg:#e6e8ed;
    --danger:    #dc2626;
    --radius:    10px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  /* Dark palette values, shared by "System follows OS = dark" and forced dark. */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --bg:        #0e0f13;
      --bg-2:      #16181f;
      --bg-3:      #1d2029;
      --panel:     #14161c;
      --line:      #262a35;
      --line-soft: #1f2230;
      --txt:       #e6e8ee;
      --txt-dim:   #9aa0ad;
      --txt-faint: #646b7a;
      --accent:    #6ea8fe;
      --busy:      #34d399;
      --busy-bg:   #0f2b22;
      --waiting:   #fbbf24;
      --waiting-bg:#2e2410;
      --inactive:  #6b7280;
      --inactive-bg:#1c1f27;
      --danger:    #f87171;
    }
  }
  :root[data-theme="dark"] {
    --bg:        #0e0f13;
    --bg-2:      #16181f;
    --bg-3:      #1d2029;
    --panel:     #14161c;
    --line:      #262a35;
    --line-soft: #1f2230;
    --txt:       #e6e8ee;
    --txt-dim:   #9aa0ad;
    --txt-faint: #646b7a;
    --accent:    #6ea8fe;
    --busy:      #34d399;
    --busy-bg:   #0f2b22;
    --waiting:   #fbbf24;
    --waiting-bg:#2e2410;
    --inactive:  #6b7280;
    --inactive-bg:#1c1f27;
    --danger:    #f87171;
  }
  /* Forced light wins over the dark media query. */
  :root[data-theme="light"] {
    --bg:        #f7f8fa;
    --bg-2:      #eef0f4;
    --bg-3:      #e3e6ec;
    --panel:     #ffffff;
    --line:      #d3d7e0;
    --line-soft: #e4e7ee;
    --txt:       #1a1d24;
    --txt-dim:   #555c6b;
    --txt-faint: #868d9c;
    --accent:    #2563eb;
    --busy:      #057a55;
    --busy-bg:   #d7f3e6;
    --waiting:   #a15c07;
    --waiting-bg:#fcefcf;
    --inactive:  #6b7280;
    --inactive-bg:#e6e8ed;
    --danger:    #dc2626;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--txt);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: var(--accent); }

  header {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(var(--bg), color-mix(in srgb, var(--bg) 88%, transparent));
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px 12px;
  }
  .titlebar { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 16px; font-weight: 650; margin: 0; letter-spacing: .2px; }
  .sub { color: var(--txt-faint); font-size: 12px; font-family: var(--mono); }
  .counts { display: flex; gap: 8px; margin-left: auto; font-size: 12px; }
  .count { display: inline-flex; align-items: center; gap: 5px; color: var(--txt-dim); }
  .count b { color: var(--txt); font-variant-numeric: tabular-nums; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.busy { background: var(--busy); }
  .dot.waiting { background: var(--waiting); }
  .dot.inactive { background: var(--inactive); }

  /* The header keeps the browse-all trigger to the right of the brand row. */
  .browseBtn {
    background: var(--accent); color: #07101f; border: none;
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
  }
  .browseBtn:hover { filter: brightness(1.05); }

  /* The filter bar wraps into tidy rows of labelled controls instead of one
     cramped line. */
  .controls {
    display: flex; align-items: center; gap: 10px 14px; flex-wrap: wrap;
    margin-top: 12px;
  }
  .ctl { display: inline-flex; align-items: center; gap: 6px; }
  .ctl > .lbl { color: var(--txt-faint); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  input[type=text], input.cell, select.filter {
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--txt);
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
  }
  select.filter { padding: 7px 9px; cursor: pointer; }
  input[type=text]:focus, input.cell:focus, select.filter:focus { border-color: var(--accent); }
  .searchbox { flex: 1; min-width: 200px; }

  .seg {
    display: inline-flex; background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden;
  }
  .seg button {
    background: transparent; border: none; color: var(--txt-dim);
    padding: 7px 12px; font-size: 12px; cursor: pointer; font-family: var(--sans);
  }
  .seg button.active { background: var(--bg-3); color: var(--txt); }
  .seg button:not(:last-child) { border-right: 1px solid var(--line); }

  label.toggle { display: inline-flex; align-items: center; gap: 6px; color: var(--txt-dim); font-size: 12px; cursor: pointer; user-select: none; }
  label.toggle input { accent-color: var(--accent); }

  /* Kind filter: a row of toggle chips. */
  .kindchips { display: inline-flex; gap: 5px; flex-wrap: wrap; }
  .kindchip {
    background: var(--bg-2); border: 1px solid var(--line); color: var(--txt-faint);
    border-radius: 999px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    font-family: var(--sans); user-select: none; text-transform: capitalize;
  }
  .kindchip.on { background: color-mix(in srgb, var(--accent) 16%, transparent); border-color: var(--accent); color: var(--txt); }

  .btn {
    background: var(--accent); color: #07101f; border: none;
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
  }
  .btn:disabled { background: var(--bg-3); color: var(--txt-faint); cursor: default; }

  main { padding: 16px 20px 80px; }
  /* The curated Main view breathes: more room between groups than the dense
     modal table, so pinned sessions read as the calm hero surface. */
  .group { margin-bottom: 30px; }

  /* Group header: a single baseline-aligned row. The caret is a real button
     with a comfortable hit area; the checkbox and label sit on the same line. */
  .group-head {
    display: flex; align-items: center; gap: 10px;
    padding: 0 2px 7px; border-bottom: 1px solid var(--line-soft); margin-bottom: 10px;
  }
  .group-caret {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; padding: 0; margin: 0;
    background: transparent; border: none; cursor: pointer; border-radius: 5px;
    color: var(--txt-faint); font-size: 12px; line-height: 1;
    transition: transform .12s, background .08s;
  }
  .group-caret:hover { background: var(--bg-2); color: var(--txt-dim); }
  .group-head.collapsed .group-caret { transform: rotate(-90deg); }
  .group-name {
    font-size: 12px; font-weight: 600; color: var(--txt-dim);
    text-transform: uppercase; letter-spacing: .6px;
  }
  .group-count { font-size: 12px; font-weight: 500; color: var(--txt-faint); font-variant-numeric: tabular-nums; }
  .group-selall {
    margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
    color: var(--txt-faint); font-size: 11px; cursor: pointer; user-select: none;
  }
  .group-selall input[type=checkbox] { margin: 0; }
  .group-selall:hover { color: var(--txt-dim); }

  .linkbtn {
    background: none; border: none; color: var(--txt-dim); cursor: pointer;
    font-size: 12px; text-decoration: underline; font-family: var(--sans); padding: 0;
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 820px; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 600; color: var(--txt-faint);
    text-transform: uppercase; letter-spacing: .5px;
    padding: 4px 10px; border-bottom: 1px solid var(--line-soft);
  }
  tbody td { padding: 9px 10px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  tbody tr { transition: background .08s; }
  tbody tr:hover { background: var(--bg-2); }
  tbody tr.sel { background: color-mix(in srgb, var(--accent) 10%, transparent); }
  tbody tr.archived { opacity: .55; }

  .col-pick { width: 28px; }
  .col-status { width: 96px; }
  .col-when { width: 110px; }
  input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    text-transform: capitalize;
  }
  .badge.busy { color: var(--busy); background: var(--busy-bg); }
  .badge.waiting { color: var(--waiting); background: var(--waiting-bg); }
  .badge.inactive { color: var(--inactive); background: var(--inactive-bg); }

  .kindbadge {
    display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px;
    border-radius: 5px; background: var(--bg-3); color: var(--txt-faint);
    text-transform: uppercase; letter-spacing: .4px; margin-left: 6px; vertical-align: middle;
  }

  .proj { font-family: var(--mono); font-size: 12.5px; color: var(--txt); }
  .title { color: var(--txt); }
  .title .muted { color: var(--txt-faint); font-style: italic; }
  .branch { font-family: var(--mono); font-size: 12px; color: var(--txt-dim); }
  .branch::before { content: "⎇ "; color: var(--txt-faint); }
  .when { font-family: var(--mono); font-size: 12px; color: var(--txt-dim); white-space: nowrap; }
  .cwd { font-family: var(--mono); font-size: 11px; color: var(--txt-faint); margin-top: 2px; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* last-message preview: one dim line, click the caret to expand. */
  .preview { display: flex; align-items: flex-start; gap: 5px; margin-top: 3px; max-width: 420px; }
  .preview .pcaret { color: var(--txt-faint); font-size: 9px; cursor: pointer; user-select: none; padding-top: 2px; transition: transform .12s; }
  .preview.open .pcaret { transform: rotate(90deg); }
  .preview .ptext {
    color: var(--txt-faint); font-size: 11.5px; cursor: pointer; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .preview.open .ptext { white-space: pre-wrap; word-break: break-word; }

  /* Notion-style selectors */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-3); color: var(--txt-dim); font-size: 11px; padding: 2px 4px 2px 7px; border-radius: 6px; font-family: var(--mono); }
  .tag .x { cursor: pointer; color: var(--txt-faint); font-size: 12px; line-height: 1; padding: 0 2px; }
  .tag .x:hover { color: var(--danger); }
  .cat-cell, .tags-cell { min-width: 150px; }

  .selctl {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    background: var(--bg-2); border: 1px dashed var(--line); border-radius: 7px;
    padding: 4px 9px; font-size: 12px; color: var(--txt-dim); font-family: var(--sans);
  }
  .selctl:hover { border-color: var(--accent); color: var(--txt); }
  .cat-pill {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    color: var(--txt); border-radius: 7px; padding: 3px 9px; font-size: 12px; font-family: var(--sans);
  }
  .cat-pill:hover { border-color: var(--accent); }

  /* Pin control: the one action shared by both surfaces. In Browse-all the
     unpinned state invites the action; the pinned state reads as a settled
     label, not a button shouting to be clicked. */
  .pinbtn {
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    background: transparent; border: 1px solid var(--line); color: var(--txt-dim);
    border-radius: 999px; padding: 4px 11px; font-size: 12px; cursor: pointer;
    font-family: var(--sans);
  }
  .pinbtn:hover { border-color: var(--accent); color: var(--txt); }
  .pinbtn.pinned {
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    border-color: color-mix(in srgb, var(--accent) 35%, transparent);
    color: var(--txt);
  }
  .pinbtn .ic { font-size: 12px; line-height: 1; }

  /* Popover for category / tag pickers */
  .popover {
    position: absolute; z-index: 80; min-width: 220px; max-width: 280px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35); padding: 8px; font-size: 13px;
  }
  .popover input.psearch {
    width: 100%; background: var(--bg-2); border: 1px solid var(--line); color: var(--txt);
    border-radius: 7px; padding: 7px 9px; font-size: 13px; outline: none; margin-bottom: 6px;
  }
  .popover input.psearch:focus { border-color: var(--accent); }
  .poplist { max-height: 240px; overflow-y: auto; }
  .popitem {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; color: var(--txt);
  }
  .popitem:hover { background: var(--bg-2); }
  .popitem .check { width: 14px; color: var(--accent); font-size: 12px; }
  .popitem.create { color: var(--accent); }
  .popitem .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .popdiv { height: 1px; background: var(--line-soft); margin: 5px 0; }
  .popitem.clear { color: var(--txt-faint); }
  .popempty { color: var(--txt-faint); padding: 6px 8px; font-size: 12px; }

  .iconbtn {
    background: transparent; border: 1px solid var(--line); color: var(--txt-dim);
    border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; font-family: var(--sans);
    white-space: nowrap;
  }
  .iconbtn:hover { border-color: var(--accent); color: var(--txt); }
  .iconbtn.on { color: var(--waiting); border-color: var(--waiting); }

  /* Calm, inviting empty state for the curated Main view. */
  .empty { color: var(--txt-faint); text-align: center; padding: 40px 20px; font-size: 14px; }
  .empty-hero {
    max-width: 420px; margin: 64px auto; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .empty-hero .glyph { font-size: 34px; line-height: 1; opacity: .8; }
  .empty-hero h2 { font-size: 17px; font-weight: 650; margin: 0; color: var(--txt); }
  .empty-hero p { margin: 0; color: var(--txt-faint); font-size: 13.5px; max-width: 320px; }
  .empty-hero .btn { margin-top: 4px; padding: 10px 18px; }

  /* sticky action bar */
  .actionbar {
    position: fixed; left: 50%; transform: translateX(-50%) translateY(160%);
    bottom: 22px; z-index: 90;
    background: var(--bg-3); border: 1px solid var(--line);
    border-radius: 12px; padding: 10px 12px 10px 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
    transition: transform .18s ease; max-width: calc(100vw - 40px);
  }
  .actionbar.show { transform: translateX(-50%) translateY(0); }
  .actionbar .n { font-size: 13px; color: var(--txt-dim); }
  .actionbar .n b { color: var(--txt); }
  .actionbar .iconbtn { padding: 6px 11px; font-size: 12px; }

  /* Browse-all modal: a large centered overlay, dense and utilitarian. */
  .overlay {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(0,0,0,.5);
    display: none; align-items: flex-start; justify-content: center;
    padding: 4vh 16px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--bg); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 20px 70px rgba(0,0,0,.55);
    width: 100%; max-width: 1100px; max-height: 92vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--line);
  }
  .modal-head h2 { font-size: 15px; font-weight: 650; margin: 0; }
  .modal-head .modsub { color: var(--txt-faint); font-size: 12px; }
  .modal-close {
    margin-left: auto; background: var(--bg-2); border: 1px solid var(--line);
    color: var(--txt-dim); border-radius: 8px; width: 30px; height: 30px;
    font-size: 16px; line-height: 1; cursor: pointer; display: inline-flex;
    align-items: center; justify-content: center;
  }
  .modal-close:hover { border-color: var(--accent); color: var(--txt); }
  .modal-controls {
    display: flex; align-items: center; gap: 10px 14px; flex-wrap: wrap;
    padding: 12px 18px; border-bottom: 1px solid var(--line-soft); background: var(--bg);
  }
  .modal-body { overflow-y: auto; padding: 4px 8px 16px; flex: 1; }

  /* toast */
  #toast {
    position: fixed; bottom: 22px; right: 22px; z-index: 100;
    background: var(--bg-3); border: 1px solid var(--line);
    border-left: 3px solid var(--busy);
    color: var(--txt); padding: 11px 15px; border-radius: 8px; font-size: 13px;
    box-shadow: 0 8px 30px rgba(0,0,0,.45);
    opacity: 0; transform: translateY(10px); transition: opacity .2s, transform .2s;
    pointer-events: none; max-width: 360px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.err { border-left-color: var(--danger); }

  /* theme cycle button */
  #themeBtn {
    background: var(--bg-2); border: 1px solid var(--line); color: var(--txt-dim);
    border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer;
    font-family: var(--sans); display: inline-flex; align-items: center; gap: 6px;
    line-height: 1;
  }
  #themeBtn:hover { border-color: var(--accent); color: var(--txt); }
  #themeBtn .ic { font-size: 14px; }

  /* Quality floor: a clear, consistent keyboard focus ring everywhere. */
  :focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
<script>
  // Apply the saved theme before first paint to avoid a flash of the default palette.
  (() => {
    try {
      const m = localStorage.getItem("ccs-theme");
      if (m === "light" || m === "dark") document.documentElement.setAttribute("data-theme", m);
    } catch (e) {}
  })();
</script>
</head>
<body>
<header>
  <div class="titlebar">
    <h1>Claude Sessions</h1>
    <span class="sub" id="updated">—</span>
    <div class="counts" id="counts"></div>
    <button class="browseBtn" id="browseBtn" type="button">Browse all</button>
    <button id="themeBtn" type="button" title="Toggle theme"></button>
  </div>
  <div class="controls">
    <input type="text" id="search" class="searchbox" placeholder="Search pinned by title, project, tags…" autocomplete="off" spellcheck="false">
    <div class="seg" id="groupseg">
      <button data-group="project" class="active">Group: Project</button>
      <button data-group="category">Category</button>
      <button data-group="none">None</button>
    </div>
    <span class="ctl"><span class="lbl">Status</span>
      <select class="filter" id="statusFilter">
        <option value="">all</option>
        <option value="busy">busy</option>
        <option value="waiting">waiting</option>
        <option value="inactive">inactive</option>
      </select></span>
    <span class="ctl"><span class="lbl">Category</span>
      <select class="filter" id="categoryFilter"><option value="">all</option></select></span>
    <span class="ctl"><span class="lbl">Tag</span>
      <select class="filter" id="tagFilter"><option value="">all</option></select></span>
    <label class="toggle"><input type="checkbox" id="showArchived"> Show archived</label>
    <button class="linkbtn" id="expandAll">expand all</button>
    <button class="linkbtn" id="collapseAll">collapse all</button>
  </div>
</header>

<main id="main">
  <div class="empty">Loading sessions…</div>
</main>

<div class="actionbar" id="actionbar">
  <span class="n"><b id="selCount">0</b> selected</span>
  <button class="btn" id="openBtn">Open selected</button>
  <button class="iconbtn" id="bulkUnpin">Remove from dashboard</button>
  <button class="iconbtn" id="bulkArchive">Archive</button>
  <button class="iconbtn" id="bulkUnarchive">Unarchive</button>
  <button class="iconbtn" id="bulkCategory">Move to category…</button>
  <button class="linkbtn" id="clearSel">clear</button>
</div>

<!-- Browse-all modal: the firehose of every session, where you discover and pin. -->
<div class="overlay" id="browseOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Browse all sessions">
    <div class="modal-head">
      <h2>Browse all sessions</h2>
      <span class="modsub" id="browseSub"></span>
      <button class="modal-close" id="browseClose" type="button" title="Close (Esc)" aria-label="Close">✕</button>
    </div>
    <div class="modal-controls">
      <input type="text" id="browseSearch" class="searchbox" placeholder="Search every session…" autocomplete="off" spellcheck="false">
      <span class="ctl"><span class="lbl">Status</span>
        <select class="filter" id="browseStatusFilter">
          <option value="">all</option>
          <option value="busy">busy</option>
          <option value="waiting">waiting</option>
          <option value="inactive">inactive</option>
        </select></span>
      <span class="ctl"><span class="lbl">Project</span>
        <select class="filter" id="browseProjectFilter"><option value="">all</option></select></span>
      <span class="ctl"><span class="lbl">Kinds</span>
        <span class="kindchips" id="browseKindChips"></span></span>
    </div>
    <div class="modal-body" id="browseBody"></div>
  </div>
</div>

<div class="actionbar" id="browseActionbar">
  <span class="n"><b id="browseSelCount">0</b> selected</span>
  <button class="btn" id="browseOpenBtn">Open selected</button>
  <button class="iconbtn" id="browseBulkPin">Pin</button>
  <button class="iconbtn" id="browseBulkUnpin">Unpin</button>
  <button class="linkbtn" id="browseClearSel">clear</button>
</div>

<div id="toast"></div>

<script>
(() => {
  "use strict";

  const ALL_KINDS = ["main", "worktree", "background", "sdk", "example", "gym"];
  const DEFAULT_KINDS = ["main", "worktree", "background"];
  const LS = {
    theme: "ccs-theme",
    kinds: "ccs-browse-kinds",
    collapsed: "ccs-collapsed",
  };

  // Two surfaces share one session feed. `main` is the curated pinned view;
  // `browse` is the modal firehose. Each keeps its own filters and selection so
  // closing the modal returns the user to an undisturbed Main view.
  const state = {
    sessions: [],
    options: { categories: [], tags: [] },
    // ---- Main (pinned) view ----
    selected: new Set(),
    filter: "",
    group: "project",            // project | category | none
    showArchived: false,
    statusFilter: "",
    categoryFilter: "",
    tagFilter: "",
    collapsed: loadCollapsed(),  // group names collapsed in Main
    expandedPreviews: new Set(), // ids with the message preview expanded (both views)
    // ---- Browse-all modal ----
    browseOpen: false,
    browseSelected: new Set(),
    browseFilter: "",
    browseStatusFilter: "",
    browseProjectFilter: "",
    browseKinds: loadKinds(),    // Set of kind strings, modal only
    // ---- shared ----
    popoverOpen: false,          // suppress refresh re-render while a popover is up
  };

  // ---- localStorage helpers ------------------------------------------------
  function loadKinds() {
    try {
      const raw = localStorage.getItem(LS.kinds);
      if (raw) { const a = JSON.parse(raw); if (Array.isArray(a)) return new Set(a); }
    } catch (e) {}
    return new Set(DEFAULT_KINDS);
  }
  function saveKinds() {
    try { localStorage.setItem(LS.kinds, JSON.stringify([...state.browseKinds])); } catch (e) {}
  }
  function loadCollapsed() {
    try {
      const raw = localStorage.getItem(LS.collapsed);
      if (raw) { const a = JSON.parse(raw); if (Array.isArray(a)) return new Set(a); }
    } catch (e) {}
    return new Set();
  }
  function saveCollapsed() {
    try { localStorage.setItem(LS.collapsed, JSON.stringify([...state.collapsed])); } catch (e) {}
  }

  // ---- data ----------------------------------------------------------------
  async function fetchSessions() {
    const res = await fetch("/api/sessions");
    if (!res.ok) throw new Error("sessions " + res.status);
    return res.json();
  }

  async function fetchOptions() {
    const res = await fetch("/api/options");
    if (!res.ok) throw new Error("options " + res.status);
    const o = await res.json();
    // The API encodes empty option universes as JSON null; normalize to arrays
    // so callers can always .filter / .includes.
    return { categories: o.categories || [], tags: o.tags || [] };
  }

  async function postMeta(meta) {
    const res = await fetch("/api/meta", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(meta),
    });
    if (!res.ok) throw new Error("meta " + res.status);
  }

  async function postPin(id, pinned) {
    const res = await fetch("/api/pin", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, pinned }),
    });
    if (!res.ok) throw new Error("pin " + res.status);
  }

  async function postBulk(body) {
    const res = await fetch("/api/bulk", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error("bulk " + res.status);
    return res.json();
  }

  async function postOpen(ids) {
    const res = await fetch("/api/open", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids }),
    });
    if (!res.ok) throw new Error("open " + res.status);
    return res.json();
  }

  // ---- derived helpers -----------------------------------------------------
  function projBase(cwd) {
    if (!cwd) return "(no cwd)";
    const parts = cwd.split("/").filter(Boolean);
    return parts.length ? parts[parts.length - 1] : cwd;
  }

  function relTime(iso) {
    const t = new Date(iso).getTime();
    if (!t) return "—";
    const s = Math.round((Date.now() - t) / 1000);
    if (s < 45) return "just now";
    const m = Math.round(s / 60);
    if (m < 60) return m + "m ago";
    const h = Math.round(m / 60);
    if (h < 24) return h + "h ago";
    const d = Math.round(h / 24);
    if (d < 30) return d + "d ago";
    return new Date(t).toLocaleDateString();
  }

  function textMatch(s, query) {
    const q = query.trim().toLowerCase();
    if (!q) return true;
    const hay = [s.title, projBase(s.cwd), s.cwd, (s.tags || []).join(" "), s.category, s.lastMessage]
      .join(" ").toLowerCase();
    return q.split(/\s+/).every(term => hay.includes(term));
  }

  // ---- Main (pinned) view filtering ----------------------------------------
  function pinnedSessions() {
    return state.sessions.filter(s => s.pinned);
  }

  // All Main filters combine with AND. Operates over pinned sessions only.
  function passesMainFilters(s) {
    if (!state.showArchived && s.archived) return false;
    if (state.statusFilter && s.status !== state.statusFilter) return false;
    if (state.categoryFilter && (s.category || "") !== state.categoryFilter) return false;
    if (state.tagFilter && !(s.tags || []).includes(state.tagFilter)) return false;
    return textMatch(s, state.filter);
  }

  function visibleMainSessions() {
    return pinnedSessions().filter(passesMainFilters);
  }

  function groupKey(s) {
    if (state.group === "project") return projBase(s.cwd);
    if (state.group === "category") return s.category || "(uncategorized)";
    return "";
  }

  function buildGroups(sessions) {
    if (state.group === "none") return [["", sessions]];
    const map = new Map();
    for (const s of sessions) {
      const k = groupKey(s);
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(s);
    }
    return [...map.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  }

  // ---- Browse-all modal filtering ------------------------------------------
  function passesBrowseFilters(s) {
    if (!state.browseKinds.has(s.kind)) return false;
    if (state.browseStatusFilter && s.status !== state.browseStatusFilter) return false;
    if (state.browseProjectFilter && projBase(s.cwd) !== state.browseProjectFilter) return false;
    return textMatch(s, state.browseFilter);
  }

  // Browse-all is ungrouped and sorted newest-active-first.
  function visibleBrowseSessions() {
    return state.sessions
      .filter(passesBrowseFilters)
      .sort((a, b) => new Date(b.lastActive) - new Date(a.lastActive));
  }

  function distinctProjects() {
    const set = new Set(state.sessions.map(s => projBase(s.cwd)));
    return [...set].sort((a, b) => a.localeCompare(b));
  }

  // ---- DOM construction ----------------------------------------------------
  function el(tag, attrs, ...kids) {
    const e = document.createElement(tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") e.className = v;
      else if (k === "html") e.innerHTML = v;
      else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
      else if (v !== null && v !== undefined) e.setAttribute(k, v);
    }
    for (const kid of kids) if (kid != null) e.append(kid);
    return e;
  }

  function statusBadge(status) {
    return el("span", { class: "badge " + status },
      el("span", { class: "dot " + status }), status);
  }

  function titleCell(s) {
    const t = (s.title && s.title.trim())
      ? el("span", { class: "title" }, s.title)
      : el("span", { class: "title" }, el("span", { class: "muted" }, "untitled"));
    const head = el("div", null, t);
    // Show the kind badge on anything that isn't a plain main session, so
    // revealed noise (sdk / example / gym / worktree / background) is obvious.
    if (s.kind && s.kind !== "main") head.append(el("span", { class: "kindbadge" }, s.kind));
    const out = el("div", null, head);
    if (s.lastMessage && s.lastMessage.trim()) out.append(previewBlock(s));
    return out;
  }

  function previewBlock(s) {
    const open = state.expandedPreviews.has(s.id);
    const block = el("div", { class: "preview" + (open ? " open" : "") });
    const toggle = () => {
      if (state.expandedPreviews.has(s.id)) state.expandedPreviews.delete(s.id);
      else state.expandedPreviews.add(s.id);
      renderAll();
    };
    block.append(
      el("span", { class: "pcaret", onclick: toggle }, "▶"),
      el("span", { class: "ptext", title: "click to expand", onclick: toggle }, s.lastMessage));
    return block;
  }

  // ----- category single-select control + popover --------------------------
  function categoryControl(s) {
    const ctl = s.category
      ? el("span", { class: "cat-pill" }, s.category)
      : el("span", { class: "selctl" }, "＋ category");
    ctl.addEventListener("click", (ev) => {
      ev.stopPropagation();
      openCategoryPopover(ctl, s);
    });
    return ctl;
  }

  function openCategoryPopover(anchor, s) {
    openPopover(anchor, (pop, q, close) => {
      pop.replaceChildren();
      const search = pop.appendChild(searchInput(q));
      const list = el("div", { class: "poplist" });
      const opts = state.options.categories.filter(c => c.toLowerCase().includes(q.toLowerCase()));
      for (const c of opts) {
        const selected = c === s.category;
        list.append(popItem(selected, c, () => { close(); setCategory(s, c); }));
      }
      const typed = q.trim();
      const exact = state.options.categories.some(c => c.toLowerCase() === typed.toLowerCase());
      if (typed && !exact) {
        list.append(el("div", { class: "popitem create", onclick: () => { close(); setCategory(s, typed); } },
          el("span", { class: "name" }, '➕ Create "' + typed + '"')));
      }
      if (!opts.length && !(typed && !exact)) list.append(el("div", { class: "popempty" }, "No categories"));
      pop.append(list);
      if (s.category) {
        pop.append(el("div", { class: "popdiv" }));
        pop.append(el("div", { class: "popitem clear", onclick: () => { close(); setCategory(s, ""); } },
          el("span", { class: "name" }, "✕ Clear category")));
      }
      return search;
    });
  }

  function setCategory(s, value) {
    commitMeta(s, { category: value });
  }

  // ----- tag multi-select control + popover ---------------------------------
  function tagsControl(s) {
    const wrap = el("div", { class: "tags" });
    for (const t of (s.tags || [])) {
      wrap.append(el("span", { class: "tag" }, t,
        el("span", { class: "x", title: "remove", onclick: (ev) => { ev.stopPropagation(); removeTag(s, t); } }, "×")));
    }
    const add = el("span", { class: "selctl", onclick: (ev) => { ev.stopPropagation(); openTagPopover(add, s); } }, "＋ tag");
    wrap.append(add);
    return wrap;
  }

  function openTagPopover(anchor, s) {
    openPopover(anchor, (pop, q, close) => {
      pop.replaceChildren();
      const search = pop.appendChild(searchInput(q));
      const list = el("div", { class: "poplist" });
      const current = new Set(s.tags || []);
      const opts = state.options.tags.filter(t => t.toLowerCase().includes(q.toLowerCase()));
      for (const t of opts) {
        // Keep the popover open on toggle so several tags can be set at once.
        list.append(popItem(current.has(t), t, () => toggleTag(s, t, () => openTagPopover(anchor, s))));
      }
      const typed = q.trim();
      const exact = state.options.tags.some(t => t.toLowerCase() === typed.toLowerCase());
      if (typed && !exact) {
        list.append(el("div", { class: "popitem create", onclick: () => { close(); addTag(s, typed); } },
          el("span", { class: "name" }, '➕ Create "' + typed + '"')));
      }
      if (!opts.length && !(typed && !exact)) list.append(el("div", { class: "popempty" }, "No tags"));
      pop.append(list);
      return search;
    });
  }

  function toggleTag(s, tag, reopen) {
    const cur = new Set(s.tags || []);
    if (cur.has(tag)) cur.delete(tag); else cur.add(tag);
    commitMeta(s, { tags: [...cur] }).then(reopen);
  }
  function addTag(s, tag) {
    const cur = new Set(s.tags || []); cur.add(tag);
    commitMeta(s, { tags: [...cur] });
  }
  function removeTag(s, tag) {
    commitMeta(s, { tags: (s.tags || []).filter(t => t !== tag) });
  }

  // ----- shared popover plumbing --------------------------------------------
  let activePopover = null;

  function popItem(selected, name, onclick) {
    return el("div", { class: "popitem", onclick },
      el("span", { class: "check" }, selected ? "✓" : ""),
      el("span", { class: "name" }, name));
  }

  function searchInput(value) {
    const inp = el("input", {
      class: "psearch", type: "text", placeholder: "Search or create…",
      value: value || "", autocomplete: "off", spellcheck: "false",
    });
    inp.addEventListener("input", () => {
      if (!activePopover) return;
      // Rebuild the list in place without losing focus.
      const pop = inp.closest(".popover");
      const sel = inp.selectionStart;
      activePopover.query = inp.value;
      activePopover.build(pop, inp.value, activePopover.close);
      const fresh = pop.querySelector(".psearch");
      fresh.focus();
      try { fresh.setSelectionRange(sel, sel); } catch (e) {}
    });
    inp.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape") { ev.stopPropagation(); activePopover?.close(); }
    });
    return inp;
  }

  // openPopover mounts a positioned popover whose body `build(pop, query, close)`
  // renders. It closes on outside-click and Escape.
  function openPopover(anchor, build) {
    closePopover();
    const pop = el("div", { class: "popover" });
    document.body.append(pop);
    const rect = anchor.getBoundingClientRect();
    pop.style.top = (window.scrollY + rect.bottom + 4) + "px";
    let left = window.scrollX + rect.left;
    pop.style.left = left + "px";
    state.popoverOpen = true;

    const close = () => closePopover();
    activePopover = { el: pop, build, query: "", close };
    build(pop, "", close);
    // Clamp within viewport horizontally.
    const pr = pop.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8) {
      pop.style.left = Math.max(8, window.scrollX + window.innerWidth - pr.width - 8) + "px";
    }
    const first = pop.querySelector(".psearch");
    if (first) first.focus();

    setTimeout(() => {
      document.addEventListener("mousedown", onOutside, true);
      document.addEventListener("keydown", onEsc, true);
    }, 0);
    function onOutside(ev) { if (!pop.contains(ev.target)) close(); }
    function onEsc(ev) { if (ev.key === "Escape") close(); }
    activePopover.onOutside = onOutside;
    activePopover.onEsc = onEsc;
  }

  function closePopover() {
    if (!activePopover) return;
    document.removeEventListener("mousedown", activePopover.onOutside, true);
    document.removeEventListener("keydown", activePopover.onEsc, true);
    activePopover.el.remove();
    activePopover = null;
    state.popoverOpen = false;
    renderAll();
  }

  // ---- pin control ----------------------------------------------------------
  // The pin button says exactly what it does: "Pin" adopts the session into the
  // dashboard; once pinned it reads "Pinned" and clicking removes it.
  function pinControl(s) {
    const pinned = !!s.pinned;
    const btn = el("button", {
      class: "pinbtn" + (pinned ? " pinned" : ""),
      type: "button",
      title: pinned ? "Remove from dashboard" : "Pin to dashboard",
    }, el("span", { class: "ic" }, pinned ? "★" : "☆"), pinned ? "Pinned" : "Pin");
    btn.addEventListener("click", (ev) => { ev.stopPropagation(); setPinned(s, !pinned); });
    return btn;
  }

  async function setPinned(s, pinned) {
    // Optimistic: reflect the change locally before the round-trip so both
    // surfaces update immediately.
    s.pinned = pinned;
    if (!pinned) { s.category = ""; s.tags = []; s.archived = false; }
    state.selected.delete(s.id);
    renderAll();
    try {
      await postPin(s.id, pinned);
      toast(pinned ? "Pinned" : "Removed from dashboard");
    } catch (e) {
      toast((pinned ? "Pin" : "Remove") + " failed: " + e.message, true);
    }
    renderAll();
  }

  // ---- Main view rows & groups ---------------------------------------------
  function mainRow(s) {
    const pick = el("input", {
      type: "checkbox",
      onchange: (ev) => toggleMainSelect(s.id, ev.target.checked),
    });
    pick.checked = state.selected.has(s.id);

    const archBtn = el("button", {
      class: "iconbtn" + (s.archived ? " on" : ""),
      title: s.archived ? "Unarchive" : "Archive (set aside, keep pinned)",
      onclick: () => commitMeta(s, { archived: !s.archived }),
    }, s.archived ? "archived" : "archive");

    const projTd = el("td", null,
      el("div", { class: "proj" }, projBase(s.cwd)),
      el("div", { class: "cwd", title: s.cwd }, s.cwd || ""));

    return el("tr", { class: (state.selected.has(s.id) ? "sel " : "") + (s.archived ? "archived" : "") },
      el("td", { class: "col-pick" }, pick),
      el("td", { class: "col-status" }, statusBadge(s.status)),
      projTd,
      el("td", null, titleCell(s)),
      el("td", { class: "col-when" }, el("span", { class: "when", title: s.lastActive }, relTime(s.lastActive))),
      el("td", null, s.gitBranch ? el("span", { class: "branch" }, s.gitBranch) : el("span", { class: "muted" }, "")),
      el("td", { class: "cat-cell" }, categoryControl(s)),
      el("td", { class: "tags-cell" }, tagsControl(s)),
      el("td", null,
        el("div", { class: "tags" },
          archBtn,
          el("button", { class: "iconbtn", title: "Remove from dashboard",
            onclick: () => setPinned(s, false) }, "unpin"))));
  }

  // A single tidy baseline-aligned row: caret button, name, count, select-all.
  function groupHead(name, sessions) {
    const collapsed = state.collapsed.has(name);
    const head = el("div", { class: "group-head" + (collapsed ? " collapsed" : "") });

    const toggle = () => {
      if (state.collapsed.has(name)) state.collapsed.delete(name); else state.collapsed.add(name);
      saveCollapsed();
      renderMain();
    };
    const caret = el("button", {
      class: "group-caret", type: "button",
      title: collapsed ? "Expand group" : "Collapse group",
      "aria-label": collapsed ? "Expand group" : "Collapse group",
      onclick: toggle,
    }, "▾");

    const allSel = sessions.length > 0 && sessions.every(s => state.selected.has(s.id));
    const groupCheck = el("input", { type: "checkbox" });
    groupCheck.checked = allSel;
    groupCheck.addEventListener("change", (ev) => {
      for (const s of sessions) {
        if (ev.target.checked) state.selected.add(s.id); else state.selected.delete(s.id);
      }
      renderMain();
    });
    const selAll = el("label", { class: "group-selall", title: "Select every session in this group" },
      groupCheck, "select all");

    head.append(
      caret,
      el("span", { class: "group-name" }, name),
      el("span", { class: "group-count" }, String(sessions.length)),
      selAll);
    return head;
  }

  function mainTable(sessions) {
    const thead = el("thead", null, el("tr", null,
      el("th", { class: "col-pick" }),
      el("th", { class: "col-status" }, "Status"),
      el("th", null, "Project"),
      el("th", null, "Title"),
      el("th", { class: "col-when" }, "Active"),
      el("th", null, "Branch"),
      el("th", null, "Category"),
      el("th", null, "Tags"),
      el("th", null, "")));
    const tbody = el("tbody");
    for (const s of sessions) tbody.append(mainRow(s));
    return el("div", { class: "table-wrap" }, el("table", null, thead, tbody));
  }

  function groupBlock(name, sessions) {
    const block = el("div", { class: "group" });
    if (name) {
      block.append(groupHead(name, sessions));
      if (state.collapsed.has(name)) return block;
    }
    block.append(mainTable(sessions));
    return block;
  }

  // ---- render orchestration ------------------------------------------------
  function renderAll() {
    if (state.popoverOpen) { renderCounts(); renderMainActionBar(); renderBrowseActionBar(); return; }
    renderMain();
    if (state.browseOpen) renderBrowse();
  }

  function renderMain() {
    if (state.popoverOpen) { renderCounts(); renderMainActionBar(); return; }
    const main = document.getElementById("main");
    const anyPinned = pinnedSessions().length > 0;
    main.replaceChildren();
    if (!anyPinned) {
      main.append(emptyHero());
    } else {
      const sessions = visibleMainSessions();
      if (!sessions.length) {
        main.append(el("div", { class: "empty" }, "No pinned sessions match these filters."));
      } else {
        for (const [name, group] of buildGroups(sessions)) {
          main.append(groupBlock(name, group));
        }
      }
    }
    renderCounts();
    renderMainActionBar();
  }

  // An empty Main view is an invitation to act, not a blank page.
  function emptyHero() {
    const browse = el("button", { class: "btn", type: "button", onclick: openBrowse }, "Browse all");
    return el("div", { class: "empty-hero" },
      el("div", { class: "glyph" }, "★"),
      el("h2", null, "Your pinned workspace is empty"),
      el("p", null, "Pin sessions to track them here. Browse all your sessions to find the ones worth keeping close."),
      browse);
  }

  function renderCounts() {
    // Counts describe the curated workspace: pinned sessions by status,
    // honoring the archived toggle.
    const c = { busy: 0, waiting: 0, inactive: 0 };
    for (const s of pinnedSessions()) {
      if (s.archived && !state.showArchived) continue;
      c[s.status]++;
    }
    const box = document.getElementById("counts");
    box.replaceChildren(
      countPill("busy", c.busy), countPill("waiting", c.waiting), countPill("inactive", c.inactive));
    document.getElementById("updated").textContent =
      "updated " + new Date().toLocaleTimeString();
  }

  function countPill(kind, n) {
    return el("span", { class: "count" }, el("span", { class: "dot " + kind }),
      el("b", null, String(n)), kind);
  }

  function renderMainActionBar() {
    const bar = document.getElementById("actionbar");
    const n = state.selected.size;
    document.getElementById("selCount").textContent = String(n);
    document.getElementById("openBtn").textContent = "Open selected (" + n + ")";
    // The Main action bar must yield to the modal so the two never overlap.
    bar.classList.toggle("show", n > 0 && !state.browseOpen);
  }

  // ---- Browse-all modal rendering ------------------------------------------
  function browseRow(s) {
    const pick = el("input", {
      type: "checkbox",
      onchange: (ev) => toggleBrowseSelect(s.id, ev.target.checked),
    });
    pick.checked = state.browseSelected.has(s.id);

    const projTd = el("td", null,
      el("div", { class: "proj" }, projBase(s.cwd)),
      el("div", { class: "cwd", title: s.cwd }, s.cwd || ""));

    return el("tr", { class: state.browseSelected.has(s.id) ? "sel" : "" },
      el("td", { class: "col-pick" }, pick),
      el("td", { class: "col-status" }, statusBadge(s.status)),
      projTd,
      el("td", null, titleCell(s)),
      el("td", { class: "col-when" }, el("span", { class: "when", title: s.lastActive }, relTime(s.lastActive))),
      el("td", null, pinControl(s)));
  }

  function browseTable(sessions) {
    const thead = el("thead", null, el("tr", null,
      el("th", { class: "col-pick" }),
      el("th", { class: "col-status" }, "Status"),
      el("th", null, "Project"),
      el("th", null, "Title"),
      el("th", { class: "col-when" }, "Active"),
      el("th", null, "")));
    const tbody = el("tbody");
    for (const s of sessions) tbody.append(browseRow(s));
    return el("div", { class: "table-wrap" }, el("table", null, thead, tbody));
  }

  function renderBrowse() {
    if (state.popoverOpen) { renderBrowseActionBar(); return; }
    const body = document.getElementById("browseBody");
    const sessions = visibleBrowseSessions();
    body.replaceChildren();
    if (!sessions.length) {
      body.append(el("div", { class: "empty" }, "No sessions match these filters."));
    } else {
      body.append(browseTable(sessions));
    }
    const total = state.sessions.length;
    const pinned = pinnedSessions().length;
    document.getElementById("browseSub").textContent =
      sessions.length + " of " + total + " shown · " + pinned + " pinned";
    fillProjectFilter();
    renderBrowseActionBar();
  }

  function renderBrowseActionBar() {
    const bar = document.getElementById("browseActionbar");
    const n = state.browseSelected.size;
    document.getElementById("browseSelCount").textContent = String(n);
    document.getElementById("browseOpenBtn").textContent = "Open selected (" + n + ")";
    bar.classList.toggle("show", n > 0 && state.browseOpen);
  }

  function fillProjectFilter() {
    fillSelect(document.getElementById("browseProjectFilter"), distinctProjects(), state.browseProjectFilter);
  }

  // ---- filter controls render ----------------------------------------------
  function renderBrowseKindChips() {
    const box = document.getElementById("browseKindChips");
    box.replaceChildren();
    for (const k of ALL_KINDS) {
      const on = state.browseKinds.has(k);
      const chip = el("span", { class: "kindchip" + (on ? " on" : "") }, k);
      chip.addEventListener("click", () => {
        if (state.browseKinds.has(k)) state.browseKinds.delete(k); else state.browseKinds.add(k);
        saveKinds();
        renderBrowseKindChips();
        pruneBrowseSelection();
        renderBrowse();
      });
      box.append(chip);
    }
  }

  function syncOptionFilters() {
    fillSelect(document.getElementById("categoryFilter"), state.options.categories, state.categoryFilter);
    fillSelect(document.getElementById("tagFilter"), state.options.tags, state.tagFilter);
  }

  function fillSelect(sel, values, current) {
    const want = current && !values.includes(current) ? [current, ...values] : values;
    sel.replaceChildren(el("option", { value: "" }, "all"));
    for (const v of want) sel.append(el("option", { value: v }, v));
    sel.value = current || "";
  }

  // ---- selection mutations -------------------------------------------------
  function toggleMainSelect(id, on) {
    if (on) state.selected.add(id); else state.selected.delete(id);
    renderMain();
  }
  function toggleBrowseSelect(id, on) {
    if (on) state.browseSelected.add(id); else state.browseSelected.delete(id);
    renderBrowse();
  }

  async function commitMeta(s, patch) {
    // Optimistic local update so the row reflects the change immediately.
    if (patch.category !== undefined) s.category = patch.category;
    if (patch.tags !== undefined) s.tags = patch.tags;
    if (patch.archived !== undefined) s.archived = patch.archived;
    const body = { id: s.id };
    if (patch.category !== undefined) body.category = patch.category;
    if (patch.tags !== undefined) body.tags = patch.tags;
    if (patch.archived !== undefined) body.archived = patch.archived;
    try {
      await postMeta(body);
      // Locally register any newly-created option so it appears without a reload.
      if (patch.category) registerOption("categories", patch.category);
      if (patch.tags) for (const t of patch.tags) registerOption("tags", t);
      syncOptionFilters();
      toast("Saved");
    } catch (e) {
      toast("Save failed: " + e.message, true);
    }
    renderAll();
  }

  function registerOption(kind, value) {
    if (value && !state.options[kind].includes(value)) {
      state.options[kind] = [...state.options[kind], value].sort((a, b) => a.localeCompare(b));
    }
  }

  // ---- Main bulk actions ---------------------------------------------------
  async function runMainBulk(action, value) {
    const ids = [...state.selected];
    if (!ids.length) return;
    try {
      const res = await postBulk({ ids, action, value: value || "" });
      if (value) registerOption("categories", value);
      toast(bulkToast(action, res.updated));
      await refresh();
    } catch (e) {
      toast("Bulk action failed: " + e.message, true);
    }
  }

  function bulkToast(action, n) {
    const plural = n === 1 ? "session" : "sessions";
    if (action === "unpin") return "Removed " + n + " " + plural + " from dashboard";
    if (action === "pin") return "Pinned " + n + " " + plural;
    return "Updated " + n + " " + plural;
  }

  async function openMainSelected() {
    await openIds([...state.selected], document.getElementById("openBtn"));
  }

  // ---- Browse bulk actions -------------------------------------------------
  async function runBrowseBulk(action) {
    const ids = [...state.browseSelected];
    if (!ids.length) return;
    try {
      const res = await postBulk({ ids, action, value: "" });
      toast(bulkToast(action, res.updated));
      await refresh();
    } catch (e) {
      toast("Bulk action failed: " + e.message, true);
    }
  }

  async function openBrowseSelected() {
    await openIds([...state.browseSelected], document.getElementById("browseOpenBtn"));
  }

  async function openIds(ids, btn) {
    if (!ids.length) return;
    btn.disabled = true;
    try {
      const res = await postOpen(ids);
      toast("Opened " + res.opened + " session" + (res.opened === 1 ? "" : "s"));
    } catch (e) {
      toast("Open failed: " + e.message, true);
    } finally {
      btn.disabled = false;
    }
  }

  // "Move to category…": a popover anchored on the bulk button. Reuses the
  // category picker shape (search + existing options + create row).
  function openBulkCategoryPopover(anchor) {
    openPopover(anchor, (pop, q, close) => {
      pop.replaceChildren();
      const search = pop.appendChild(searchInput(q));
      const list = el("div", { class: "poplist" });
      const opts = state.options.categories.filter(c => c.toLowerCase().includes(q.toLowerCase()));
      for (const c of opts) list.append(popItem(false, c, () => { close(); runMainBulk("category", c); }));
      const typed = q.trim();
      const exact = state.options.categories.some(c => c.toLowerCase() === typed.toLowerCase());
      if (typed && !exact) {
        list.append(el("div", { class: "popitem create", onclick: () => { close(); runMainBulk("category", typed); } },
          el("span", { class: "name" }, '➕ Create "' + typed + '"')));
      }
      if (!opts.length && !(typed && !exact)) list.append(el("div", { class: "popempty" }, "No categories"));
      pop.append(list);
      pop.append(el("div", { class: "popdiv" }));
      pop.append(el("div", { class: "popitem clear", onclick: () => { close(); runMainBulk("category", ""); } },
        el("span", { class: "name" }, "✕ Clear category")));
      return search;
    });
  }

  // ---- modal open / close --------------------------------------------------
  function openBrowse() {
    state.browseOpen = true;
    document.getElementById("browseOverlay").classList.add("show");
    renderBrowseKindChips();
    fillProjectFilter();
    renderBrowse();
    renderMainActionBar();
    const inp = document.getElementById("browseSearch");
    if (inp) inp.focus();
  }

  function closeBrowse() {
    if (!state.browseOpen) return;
    state.browseOpen = false;
    document.getElementById("browseOverlay").classList.remove("show");
    renderBrowseActionBar();
    // Return to a fully up-to-date Main view (pins may have changed inside).
    renderMain();
  }

  // ---- refresh loop --------------------------------------------------------
  async function refresh() {
    // Don't clobber an open popover — the user may be mid-edit. Bulk actions
    // close their popover before calling refresh, so this never blocks them.
    if (state.popoverOpen) return;
    try {
      const [sessions, options] = await Promise.all([fetchSessions(), fetchOptions()]);
      state.sessions = sessions;
      state.options = options;
      pruneSelection();
      pruneBrowseSelection();
      syncOptionFilters();
      renderAll();
    } catch (e) {
      toast("Refresh failed: " + e.message, true);
    }
  }

  function pruneSelection() {
    const ids = new Set(state.sessions.map(s => s.id));
    for (const id of [...state.selected]) if (!ids.has(id)) state.selected.delete(id);
  }
  function pruneBrowseSelection() {
    const ids = new Set(state.sessions.map(s => s.id));
    for (const id of [...state.browseSelected]) if (!ids.has(id)) state.browseSelected.delete(id);
  }

  // ---- toast ---------------------------------------------------------------
  let toastTimer = null;
  function toast(msg, isErr) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.toggle("err", !!isErr);
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
  }

  // ---- theme ---------------------------------------------------------------
  // Cycle: System -> Light -> Dark -> System. "system" = no data-theme attribute
  // (CSS media query decides); "light"/"dark" force the palette.
  const THEME_CYCLE = ["system", "light", "dark"];
  const THEME_META = {
    system: { ic: "🖥", label: "System" },
    light:  { ic: "☀", label: "Light" },
    dark:   { ic: "🌙", label: "Dark" },
  };

  function currentTheme() {
    try {
      const m = localStorage.getItem(LS.theme);
      if (m === "light" || m === "dark") return m;
    } catch (e) {}
    return "system";
  }

  function applyTheme(mode) {
    if (mode === "light" || mode === "dark") {
      document.documentElement.setAttribute("data-theme", mode);
    } else {
      document.documentElement.removeAttribute("data-theme");
    }
    try {
      if (mode === "system") localStorage.removeItem(LS.theme);
      else localStorage.setItem(LS.theme, mode);
    } catch (e) {}
    renderThemeBtn(mode);
  }

  function renderThemeBtn(mode) {
    const meta = THEME_META[mode];
    const btn = document.getElementById("themeBtn");
    btn.replaceChildren(
      el("span", { class: "ic" }, meta.ic),
      el("span", null, meta.label));
    btn.title = "Theme: " + meta.label + " (click to cycle)";
  }

  function cycleTheme() {
    const i = THEME_CYCLE.indexOf(currentTheme());
    applyTheme(THEME_CYCLE[(i + 1) % THEME_CYCLE.length]);
  }

  // ---- expand / collapse all (Main only) -----------------------------------
  function currentGroupNames() {
    return buildGroups(visibleMainSessions()).map(([name]) => name).filter(Boolean);
  }
  function collapseAll() {
    for (const n of currentGroupNames()) state.collapsed.add(n);
    saveCollapsed(); renderMain();
  }
  function expandAll() {
    state.collapsed.clear();
    saveCollapsed(); renderMain();
  }

  // ---- wiring --------------------------------------------------------------
  function wireMainControls() {
    renderThemeBtn(currentTheme());
    document.getElementById("themeBtn").addEventListener("click", cycleTheme);
    document.getElementById("search").addEventListener("input", (e) => {
      state.filter = e.target.value; renderMain();
    });
    document.getElementById("showArchived").addEventListener("change", (e) => {
      state.showArchived = e.target.checked; pruneSelection(); renderMain();
    });
    document.getElementById("statusFilter").addEventListener("change", (e) => {
      state.statusFilter = e.target.value; renderMain();
    });
    document.getElementById("categoryFilter").addEventListener("change", (e) => {
      state.categoryFilter = e.target.value; renderMain();
    });
    document.getElementById("tagFilter").addEventListener("change", (e) => {
      state.tagFilter = e.target.value; renderMain();
    });
    document.getElementById("groupseg").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-group]");
      if (!btn) return;
      state.group = btn.dataset.group;
      for (const b of e.currentTarget.children) b.classList.toggle("active", b === btn);
      renderMain();
    });
    document.getElementById("expandAll").addEventListener("click", expandAll);
    document.getElementById("collapseAll").addEventListener("click", collapseAll);
    document.getElementById("openBtn").addEventListener("click", openMainSelected);
    document.getElementById("bulkUnpin").addEventListener("click", () => runMainBulk("unpin"));
    document.getElementById("bulkArchive").addEventListener("click", () => runMainBulk("archive"));
    document.getElementById("bulkUnarchive").addEventListener("click", () => runMainBulk("unarchive"));
    document.getElementById("bulkCategory").addEventListener("click", (e) =>
      openBulkCategoryPopover(e.currentTarget));
    document.getElementById("clearSel").addEventListener("click", () => {
      state.selected.clear(); renderMain();
    });
  }

  function wireBrowseControls() {
    document.getElementById("browseBtn").addEventListener("click", openBrowse);
    document.getElementById("browseClose").addEventListener("click", closeBrowse);
    // Outside-click on the dim backdrop closes; clicks inside the modal don't.
    document.getElementById("browseOverlay").addEventListener("mousedown", (e) => {
      if (e.target === e.currentTarget) closeBrowse();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.browseOpen && !state.popoverOpen) closeBrowse();
    });
    document.getElementById("browseSearch").addEventListener("input", (e) => {
      state.browseFilter = e.target.value; renderBrowse();
    });
    document.getElementById("browseStatusFilter").addEventListener("change", (e) => {
      state.browseStatusFilter = e.target.value; renderBrowse();
    });
    document.getElementById("browseProjectFilter").addEventListener("change", (e) => {
      state.browseProjectFilter = e.target.value; renderBrowse();
    });
    document.getElementById("browseOpenBtn").addEventListener("click", openBrowseSelected);
    document.getElementById("browseBulkPin").addEventListener("click", () => runBrowseBulk("pin"));
    document.getElementById("browseBulkUnpin").addEventListener("click", () => runBrowseBulk("unpin"));
    document.getElementById("browseClearSel").addEventListener("click", () => {
      state.browseSelected.clear(); renderBrowse();
    });
  }

  // ---- boot ----------------------------------------------------------------
  wireMainControls();
  wireBrowseControls();
  refresh();
  setInterval(refresh, 4000);
})();
</script>
</body>
</html>
